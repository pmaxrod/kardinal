services:
  web:
    build: app
    command: python manage.py tailwind runserver 0.0.0.0:8000
    tty: true
    #command: python manage.py runserver 0.0.0.0:8000 --settings=app.settings.dev
    volumes:
      - ./app/:/usr/src/app/
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    depends_on:
      - db
  db:
    image: postgres:trixie
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/docker/
    env_file:
      - .env.dev.db
volumes:
    postgres_data:
