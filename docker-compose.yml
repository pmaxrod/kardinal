services:
  web:
    container_name: web
    build: app
    command: python manage.py tailwind dev
    volumes:
      - ./app/:/usr/src/app/
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    depends_on:
      - db
  db:
    container_name: db
    image: postgres:trixie
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/docker/
    env_file:
      - .env.dev.db
volumes:
    postgres_data:
