{% extends 'base.html' %}
{% block title %}
Perfil de {{ user.username }}
{% endblock %}
{% block content %}
  <form method="post" action="{% url "users:get_user_profile" username=user.username%}">
    {% csrf_token %}
    {% for field in form %}
      {{ field }} {{ field.label }}
    {% endfor %}
    <button type="submit">Confirmar</button>
  </form>
{% endblock %}
