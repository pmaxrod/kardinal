{% load allauth %}
{% for err in attrs.form.non_field_errors %}
  <div role="alert" class="alert alert-error">{{ err.message }}</div>
{% endfor %}
<div class="card">
  <form class="" method="{{ attrs.method }}" action="{{ attrs.action }}">
    <div class="card-body">
      {% slot body %}
      {% endslot %}
      <div class="card-actions">
        {% slot actions %}
        {% endslot %}
      </div>
    </div>
  </form>
</div>
