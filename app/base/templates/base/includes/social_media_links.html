{% load static %}
<nav>
  <h2 class="footer-title">Redes sociales</h2>
  <div class="grid grid-flow-col gap-4">
    {% for link in links %}
      <a href="{{ link.url }}">
        <img width="64" height="64" src="{% static 'img/'|add:link.name.lower|add:'.svg' %}" alt="Icono de {{ link.name }}" />
      </a>
    {% endfor %}
  </div>
</nav>
