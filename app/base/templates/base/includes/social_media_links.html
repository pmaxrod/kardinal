{% load static %}
<nav class="navbar">
  <h2 class="footer-title">Redes sociales</h2>
  <div class="grid grid-flow-col gap-4">
    {% for link in links %}
      <a href="{{ link.url }}">
        <img class="icon mask-[url({% static 'img/'|add:link.name.lower|add:'.svg' %})]" 
        src="{% static 'img/'|add:link.name.lower|add:'.svg' %}" 
        alt="Icono de {{ link.name }}" />
      </a>
    {% endfor %}
  </div>
</nav>
