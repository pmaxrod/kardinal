{% load base_tags allauth %}
<div class="join join-vertical lg:join-horizontal gap-2">
  {% if user.is_authenticated %}
    <a class="btn btn-sm btn-primary" href="{% url 'account_logout' %}">Cerrar Sesión</a>
  {% else %}
    <a class="btn btn-sm btn-primary join-item" href="{% url 'account_login' %}">Iniciar Sesión</a>
    <a class="btn btn-sm btn-primary join-item" href="{% url 'account_signup' %}">Registrarse</a>
  {% endif %}
</div>
