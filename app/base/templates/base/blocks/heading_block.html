{% if self.size == 'h2' %}
  <h2 class="text-4xl my-2">{{ self.heading_text }}</h2>
{% elif self.size == 'h3' %}
  <h3 class="text-3xl my-2">{{ self.heading_text }}</h3>
{% elif self.size == 'h4' %}
  <h4 class="text-2xl my-2">{{ self.heading_text }}</h4>
{% else %}
  <h1>{{ self.heading_text }}</h1>
{% endif %}
