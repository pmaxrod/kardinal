{% load wagtailroutablepage_tags %}
<section id="categories">
  <h3 class="text-lg font-bold">Categorías:</h3>
  <div class="blog-button-container">
    {% for category in categories %}
      <a class="blog-button category" target="_blank" rel="noopener noreferrer"
      href="{% routablepageurl blog 'posts_by_category' category.blog_category.slug %}">
        {{ category }}
      </a>
    {% endfor %}
  </div>
</section>
