{% load wagtailroutablepage_tags %}
<section id="tags">
  <h1 class="text-lg font-bold">Etiquetas:</h1>
  <div class="blog-button-container">
    {% for tag in tags %}
      <a class="blog-button tag" target="_blank" rel="noopener noreferrer"
      href="{% routablepageurl blog 'posts_by_tag' tag.slug %}">
        #{{ tag }}
      </a>
    {% endfor %}
  </div>
</section>
