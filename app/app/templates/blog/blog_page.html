{% extends 'base.html' %}
{% load static wagtailcore_tags %}

{% block body_class %}
  template-blogpage
{% endblock %}

{% block content %}
  {% for post in page.get_children.live %}
    <div class="rounded-lg shadow-lg overflow-hidden max-w-lg w-full">
      <div class="p-6">
        <a href="{% pageurl post %}" class="text-2xl font-bold text-foreground mb-2">{{ post.title }}</a>
        <p class="text-foreground leading-tight mb-4">{{ post.content }}</p>
      </div>
    </div>
  {% endfor %}
  <div class="flex justify-between items-center">
    <div class="flex items-center">
      <a href="{% url 'blog:add_post' %}">Añadir post</a>
    </div>
  </div>
{% endblock %}
