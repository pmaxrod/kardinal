{% extends 'base.html' %}
{% load static wagtailcore_tags %}

{% block body_class %}
  template-blogpage
{% endblock %}

{% block content %}
  <h2 class="text-2xl font-bold text-foreground mb-2 text-center">{{ page.title }}</h2>
  <div class="flex items-center fixed">
    <button class="action-button" href="{% url 'blog:add_post' %}">Añadir post</button>
  </div>
  <div class="grid place-items-center">
    {% for post in page.get_children.live %}
      <div class="shadow-lg overflow-hidden max-w-lg w-full my-2">
        <div class="p-6 border-2">
          <a href="{% pageurl post %}" class="post-link">{{ post.title }}</a>
          <p class="leading-tight mb-4">{{ post.content }}</p>
        </div>
      </div>
    {% endfor %}
  </div>
{% endblock %}
